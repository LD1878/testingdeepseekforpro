{% if page.schema_type %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ page.schema_type }}",
  {% if page.schema_type == "HowTo" %}
  "name": "{{ page.title }}",
  "description": "{{ page.description }}",
  "step": [
    {% for step in page.steps %}
    {
      "@type": "HowToStep",
      "name": "{{ step.name }}",
      "text": "{{ step.text }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
  {% elsif page.schema_type == "FAQPage" %}
  "mainEntity": [
    {% for qa in page.faq %}
    {
      "@type": "Question",
      "name": "{{ qa.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ qa.answer }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
  {% endif %}
}
</script>
{% endif %}
